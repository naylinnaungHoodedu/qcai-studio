apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcai-api
  namespace: qcai-learning
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qcai-api
  template:
    metadata:
      labels:
        app: qcai-api
    spec:
      containers:
        - name: api
          image: gcr.io/PROJECT_ID/qcai-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: qcai-config
---
apiVersion: v1
kind: Service
metadata:
  name: qcai-api
  namespace: qcai-learning
spec:
  selector:
    app: qcai-api
  ports:
    - port: 8000
      targetPort: 8000
