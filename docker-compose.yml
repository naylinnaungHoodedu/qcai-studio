services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      SOURCE_ASSETS_ROOT: /app/source-assets
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
