apiVersion: v1
kind: Secret
metadata:
  name: qcai-secrets
  namespace: qcai-learning
type: Opaque
stringData:
  # When CLOUD_SQL_CONNECTION_NAME is set in the ConfigMap, the app uses the Cloud SQL Python connector and
  # only reads the username, password, and database name from DATABASE_URL. The placeholder host is ignored.
  DATABASE_URL: "postgresql+psycopg://qcai:replace-me@cloudsql/qcai_prod"
  OPENAI_API_KEY: "replace-me"
  PINECONE_API_KEY: "replace-me"
  PINECONE_INDEX: "replace-me"
  AUTH0_DOMAIN: "replace-me.us.auth0.com"
  AUTH0_AUDIENCE: "https://api.qantumlearn.academy"
  NEXT_PUBLIC_AUTH0_DOMAIN: "replace-me.us.auth0.com"
  NEXT_PUBLIC_AUTH0_CLIENT_ID: "replace-me"
  NEXT_PUBLIC_AUTH0_AUDIENCE: "https://api.qantumlearn.academy"
  NEXT_PUBLIC_AUTH0_SCOPE: "openid profile email"
