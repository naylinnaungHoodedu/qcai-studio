apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcai-frontend
  namespace: qcai-learning
spec:
  replicas: 2
  revisionHistoryLimit: 3
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: qcai-frontend
  template:
    metadata:
      labels:
        app: qcai-frontend
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: us-central1-docker.pkg.dev/naylinnaung/qcai-repo/qcai-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: qcai-config
            - secretRef:
                name: qcai-secrets
                optional: true
          startupProbe:
            httpGet:
              path: /ready
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: qcai-frontend
  namespace: qcai-learning
spec:
  selector:
    app: qcai-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qcai-frontend-pdb
  namespace: qcai-learning
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: qcai-frontend
