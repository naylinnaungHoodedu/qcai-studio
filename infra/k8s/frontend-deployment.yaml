apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcai-frontend
  namespace: qcai-learning
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qcai-frontend
  template:
    metadata:
      labels:
        app: qcai-frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/PROJECT_ID/qcai-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: qcai-config
            - secretRef:
                name: qcai-secrets
                optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: qcai-frontend
  namespace: qcai-learning
spec:
  selector:
    app: qcai-frontend
  ports:
    - port: 3000
      targetPort: 3000
