apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcai-ingestion-worker
  namespace: qcai-learning
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: qcai-ingestion-worker
  template:
    metadata:
      labels:
        app: qcai-ingestion-worker
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ingestion-worker
          image: us-central1-docker.pkg.dev/naylinnaung/qcai-repo/qcai-api:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app.workers.ingestion"]
          envFrom:
            - configMapRef:
                name: qcai-config
            - secretRef:
                name: qcai-secrets
                optional: false
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
---
