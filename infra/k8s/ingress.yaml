apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qcai-ingress
  namespace: qcai-learning
spec:
  tls:
    - hosts:
        - qantumlearn.academy
        - api.qantumlearn.academy
      secretName: qantumlearn-academy-tls
  rules:
    - host: qantumlearn.academy
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qcai-frontend
                port:
                  number: 3000
    - host: api.qantumlearn.academy
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qcai-api
                port:
                  number: 8000
